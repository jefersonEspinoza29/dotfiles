###################
### KEYBINDINGS ###
###################

# See https://wiki.hypr.land/Configuring/Keywords/
$mainMod = SUPER # Sets "Windows" key as main modifier

# Example binds, see https://wiki.hypr.land/Configuring/Binds/ for more
bind = $mainMod, T, exec, $terminal
bind = $mainMod, Q, exec, ~/.config/hypr/scripts/close_window.sh
bind = $mainMod, B, exec, ~/.config/hypr/scripts/toggle_lock.sh
bind = $mainMod, M, exec, command -v hyprshutdown >/dev/null 2>&1 && hyprshutdown || hyprctl dispatch exit
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, V, togglefloating,
bind = $mainMod, R, exec, ~/.config/hypr/scripts/reload.sh
bind = $mainMod, P, pseudo, # dwindle
bind = $mainMod, J, layoutmsg, togglesplit # dwindle

#cortar y pegar ventanas
bind = $mainMod CTRL, X, exec, ~/.config/hypr/scripts/win_cut.sh
bind = $mainMod CTRL, V, exec, ~/.config/hypr/scripts/win_paste.sh
bind = $mainMod, w, exec, brave

#cambiador de wallpaper
bind = $mainMod, I, exec, ~/.config/hypr/scripts/wallpaper.sh

#abrir notificaciones
bind = $mainMod, N, exec, swaync-client -t 

#abrir hyprlock
bind = $mainMod, L, exec, hyprlock

#abrir wofi
bind = $mainMod, Space, exec, wofi --show drun


#entrar/salir del scratchpad (ventanas se quedan dentro)
bind = $mainMod, G, togglespecialworkspace, scratch
#meter/sacar ventana activa del scratchpad
bind = $mainMod SHIFT, G, exec, ~/.config/hypr/scripts/scratchpad.sh

#abrir/ocultar gapless (special workspace)
bind = $mainMod, A, exec, ~/.config/hypr/scripts/start-gapless.sh


# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Mover ventana en el layout (reordenar tiling)
bind = $mainMod SHIFT, left, movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up, movewindow, u
bind = $mainMod SHIFT, down, movewindow, d

# Switch workspaces - relativo al monitor activo (1-9 en eDP-2, 10-18 en HDMI-A-1)
bind = $mainMod, 1, exec, ~/.config/hypr/scripts/workspace-switch.sh 1
bind = $mainMod, 2, exec, ~/.config/hypr/scripts/workspace-switch.sh 2
bind = $mainMod, 3, exec, ~/.config/hypr/scripts/workspace-switch.sh 3
bind = $mainMod, 4, exec, ~/.config/hypr/scripts/workspace-switch.sh 4
bind = $mainMod, 5, exec, ~/.config/hypr/scripts/workspace-switch.sh 5
bind = $mainMod, 6, exec, ~/.config/hypr/scripts/workspace-switch.sh 6
bind = $mainMod, 7, exec, ~/.config/hypr/scripts/workspace-switch.sh 7
bind = $mainMod, 8, exec, ~/.config/hypr/scripts/workspace-switch.sh 8
bind = $mainMod, 9, exec, ~/.config/hypr/scripts/workspace-switch.sh 9

# Move active window to a workspace - relativo al monitor activo
bind = $mainMod ALT, 1, exec, ~/.config/hypr/scripts/workspace-move.sh 1
bind = $mainMod ALT, 2, exec, ~/.config/hypr/scripts/workspace-move.sh 2
bind = $mainMod ALT, 3, exec, ~/.config/hypr/scripts/workspace-move.sh 3
bind = $mainMod ALT, 4, exec, ~/.config/hypr/scripts/workspace-move.sh 4
bind = $mainMod ALT, 5, exec, ~/.config/hypr/scripts/workspace-move.sh 5
bind = $mainMod ALT, 6, exec, ~/.config/hypr/scripts/workspace-move.sh 6
bind = $mainMod ALT, 7, exec, ~/.config/hypr/scripts/workspace-move.sh 7
bind = $mainMod ALT, 8, exec, ~/.config/hypr/scripts/workspace-move.sh 8
bind = $mainMod ALT, 9, exec, ~/.config/hypr/scripts/workspace-move.sh 9


# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, ~/.config/hypr/scripts/volume.sh up
bindel = ,XF86AudioLowerVolume, exec, ~/.config/hypr/scripts/volume.sh down
bindel = ,XF86AudioMute, exec, ~/.config/hypr/scripts/volume.sh mute
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, ~/.config/hypr/scripts/brightness.sh up
bindel = ,XF86MonBrightnessDown, exec, ~/.config/hypr/scripts/brightness.sh down

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

# eww
bind = $mainMod, H, exec, bash ~/.config/hypr/scripts/restart-eww.sh

# Capturas de pantalla

bind = $mainMod SHIFT, S, exec, hyprshot -m region -o ~/Imagenes/Capturas/
bind = , Print, exec, hyprshot -m output -o ~/Imagenes/Capturas/
bind = $mainMod SHIFT, V, exec, hyprshot -m window -o ~/Imagenes/Capturas/
bind = $mainMod, Print, exec, bash -c 'F=~/Imagenes/Capturas/$(date +%Y%m%d_%H%M%S)_all.png && grim "$F" && wl-copy --type image/png < "$F" && notify-send "Screenshot" "Ambas pantallas guardadas y copiadas"'
