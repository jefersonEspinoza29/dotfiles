#####################
### LOOK AND FEEL ###
#####################

# Refer to https://wiki.hypr.land/Configuring/Variables/

# https://wiki.hypr.land/Configuring/Variables/#general
general {
    gaps_in = 5
    gaps_out = 3

    border_size = 2

    col.active_border = $active_border_color
    col.inactive_border = $inactive_border_color

    resize_on_border = false
    allow_tearing = false

    layout = dwindle
}

# https://wiki.hypr.land/Configuring/Variables/#decoration
decoration {
    rounding = 8

    active_opacity = 1.0
    inactive_opacity = 0.95

    shadow {
        enabled = false
    }

    blur {
        enabled = true
        size = 2
        passes = 1
        vibrancy = 0.1
    }
}

# https://wiki.hypr.land/Configuring/Variables/#animations
animations {
    enabled = yes

    # curvas más suaves
    bezier = easeOut, 0.16, 1, 0.3, 1
    bezier = easeInOut, 0.65, 0.05, 0.36, 1

    # ventanas (más naturales)
    animation = windows, 1, 4, easeOut
    animation = windowsIn, 1, 4, easeOut
    animation = windowsOut, 1, 3, easeInOut

    # fade suave
    animation = fade, 1, 3, easeInOut

    # workspaces tipo “deslizamiento”
    animation = workspaces, 1, 8, easeOut
}

# Ref https://wiki.hypr.land/Configuring/Workspace-Rules/
